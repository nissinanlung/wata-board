name: Comprehensive Tests and Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend Tests & Validation
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: test_user
          POSTGRES_DB: wata_board_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
        
    - name: Install backend dependencies
      run: |
        cd backend
        npm ci
        
    - name: Wait for PostgreSQL
      run: |
        echo "Waiting for PostgreSQL to be ready..."
        until pg_isready -h localhost -p 5432 -U test_user; do
          sleep 2
        done
        echo "PostgreSQL is ready!"
        
    - name: TypeScript compilation check
      run: |
        cd backend
        npm run build
        
    - name: Lint backend code
      run: |
        cd backend
        npx eslint src --ext .ts || echo "ESLint not configured"
        
    - name: Run backend unit tests with coverage
      run: |
        cd backend
        npm run test:coverage
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: wata_board_test
        DB_USER: test_user
        DB_PASSWORD: test_password
        DB_SSL: false
        NODE_ENV: test
        
    - name: Run integration tests
      run: |
        cd backend
        npm run test -- --config jest.config.migrations.js
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: wata_board_test
        DB_USER: test_user
        DB_PASSWORD: test_password
        DB_SSL: false
        NODE_ENV: test
        
    - name: Security audit
      run: |
        cd backend
        npm audit --audit-level moderate
        
    - name: Upload backend coverage
      uses: codecov/codecov-action@v3
      with:
        directory: backend/coverage
        files: ./lcov.info,./clover.xml
        flags: backend
        name: backend-coverage

  frontend-tests:
    name: Frontend Tests & Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci
        
    - name: TypeScript compilation check
      run: |
        cd frontend
        npm run build
        
    - name: Lint frontend code
      run: |
        cd frontend
        npm run lint
        
    - name: Run unit tests with coverage
      run: |
        cd frontend
        npm run test:coverage
        
    - name: Install Playwright browsers
      run: |
        cd frontend
        npx playwright install --with-deps
        
    - name: Run E2E tests
      run: |
        cd frontend
        npx playwright test
      env:
        CI: true
        
    - name: Security audit
      run: |
        cd frontend
        npm audit --audit-level moderate
        
    - name: Upload frontend coverage
      uses: codecov/codecov-action@v3
      with:
        directory: frontend/coverage
        files: ./lcov.info
        flags: frontend
        name: frontend-coverage

  contract-tests:
    name: Contract Tests & Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
        
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
          
    - name: Install stellar-cli
      run: cargo install stellar-cli --locked
      
    - name: Build contract
      run: stellar contract build
      working-directory: ./contract
      
    - name: Run contract tests
      run: cargo test --verbose
      working-directory: ./contract
      
    - name: Check contract formatting
      run: cargo fmt -- --check
      working-directory: ./contract
      
    - name: Run clippy
      run: cargo clippy -- -D warnings
      working-directory: ./contract
      
    - name: Contract security audit
      run: cargo audit
      working-directory: ./contract

  integration-tests:
    name: Full Stack Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, contract-tests]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: test_user
          POSTGRES_DB: wata_board_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
        
    - name: Install dependencies
      run: |
        cd backend && npm ci
        cd ../frontend && npm ci
        
    - name: Build contract
      run: |
        cargo install stellar-cli --locked
        stellar contract build
      working-directory: ./contract
      
    - name: Start backend server
      run: |
        cd backend
        npm run build
        npm start &
        sleep 10
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: wata_board_test
        DB_USER: test_user
        DB_PASSWORD: test_password
        DB_SSL: false
        NODE_ENV: test
        PORT: 3001
        
    - name: Start frontend dev server
      run: |
        cd frontend
        npm run dev &
        sleep 10
      env:
        VITE_API_URL: http://localhost:3001
        
    - name: Run integration tests
      run: |
        cd frontend
        npx playwright test --config=playwright.config.ts e2e/
      env:
        CI: true
        BASE_URL: http://localhost:5173
        
    - name: API integration tests
      run: |
        cd backend
        npm run test:api || echo "API integration tests not configured"

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
        
    - name: Dependency security audit
      run: |
        # Backend audit
        cd backend
        npm audit --audit-level moderate || true
        
        # Frontend audit
        cd ../frontend
        npm audit --audit-level moderate || true
        
        # Contract audit
        cd ../contract
        cargo audit || true

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, contract-tests, integration-tests, security-scan]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      with:
        path: artifacts/
        
    - name: Check coverage thresholds
      run: |
        # Check backend coverage
        if [ -f "artifacts/backend-coverage/coverage-summary.json" ]; then
          COVERAGE=$(node -pe "JSON.parse(require('fs').readFileSync('artifacts/backend-coverage/coverage-summary.json', 'utf8')).total.lines.pct")
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "❌ Backend coverage $COVERAGE% is below threshold 70%"
            exit 1
          else
            echo "✅ Backend coverage $COVERAGE% meets threshold"
          fi
        fi
        
        # Check frontend coverage
        if [ -f "artifacts/frontend-coverage/coverage-summary.json" ]; then
          COVERAGE=$(node -pe "JSON.parse(require('fs').readFileSync('artifacts/frontend-coverage/coverage-summary.json', 'utf8')).total.lines.pct")
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "❌ Frontend coverage $COVERAGE% is below threshold 70%"
            exit 1
          else
            echo "✅ Frontend coverage $COVERAGE% meets threshold"
          fi
        fi
        
    - name: Check test results
      run: |
        echo "✅ All tests passed successfully!"
        echo "✅ Security scans completed"
        echo "✅ Quality gates passed"
